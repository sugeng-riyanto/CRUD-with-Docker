{% extends 'base.html' %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-header bg-warning">Edit Produk</div>
    <div class="card-body">
        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">Nama Produk</label>
                <input type="text" name="name" class="form-control" value="{{ product.name }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Deskripsi</label>
                <textarea name="description" class="form-control" rows="3">{{ product.description }}</textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Harga (Rp)</label>
                <input type="number" step="0.01" name="price" class="form-control" value="{{ product.price }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Gambar Produk (Kosongkan jika tidak ingin mengganti)</label>
                {% if product.image %}
                    <div class="mb-2">
                        <img src="{{ url_for('static', filename='uploads/' + product.image) }}" width="100" style="object-fit: cover; border-radius: 5px;">
                        <p class="text-muted small">Gambar saat ini: {{ product.image }}</p>
                    </div>
                {% endif %}
                <input type="file" name="image" class="form-control" accept="image/*">
            </div>
            <button type="submit" class="btn btn-primary">Update</button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">Batal</a>
        </form>
    </div>
</div>
{% endblock %}
